<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>TN CM Mock Election 2026</title>\n    <link rel=\"stylesheet\" href=\"styles.css\">\n</head>\n<body>\n    <header>\n        <h1>TN CM Mock Election 2026</h1>\n    </header>\n    <main>\n        <section id=\"voter-auth\">\n            <h2>Voter Authentication</h2>\n            <form id=\"auth-form\">\n                <label for=\"voter-id\">Voter ID:</label>\n                <input type=\"text\" id=\"voter-id\" required>\n                <label for=\"password\">Password:</label>\n                <input type=\"password\" id=\"password\" required>\n                <button type=\"submit\">Authenticate</button>\n            </form>\n        </section>\n        <section id=\"candidate-selection\">\n            <h2>Select Your Candidate</h2>\n            <form id=\"candidate-form\">\n                <label for=\"candidate\">Choose Candidate:</label>\n                <select id=\"candidate\">\n                    <option value=\"candidate1\">Candidate 1</option>\n                    <option value=\"candidate2\">Candidate 2</option>\n                </select>\n                <button type=\"submit\">Vote</button>\n            </form>\n        </section>\n        <section id=\"results-dashboard\">\n            <h2>Real-time Results Dashboard</h2>\n            <div id=\"results\"></div>\n        </section>\n    </main>\n    <script src=\"https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js\"></script>\n    <script src=\"https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js\"></script>\n    <script src=\"app.js\"></script>\n</body>\n</html>\n
